version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: payroll_pass
      POSTGRES_DB: payroll_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll -d payroll_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
